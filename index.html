<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LRN Quiz Builder</title>
  <style>
    /* ============================================================
       CSS VARIABLES
    ============================================================ */
    :root {
      --bg-dark: #0a0a1a;
      --bg-purple: #1a0a2e;
      --panel-dark: rgba(0, 0, 20, 0.75);
      --accent-green: #22c55e;
      --accent-red: #ef4444;
      --accent-blue: #3b82f6;
      --accent-magenta: #d946ef;
      --text-white: #f8fafc;
      --card-radius: 12px;
    }

    /* ============================================================
       RESET & BASE
    ============================================================ */
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; }
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: var(--bg-dark);
      color: var(--text-white);
    }
    #app {
      width: 100vw;
      height: 100vh;
      position: relative;
      overflow: hidden;
    }
    button { font-family: inherit; }
    input, textarea, select { font-family: inherit; }

    /* ============================================================
       BACKGROUND GRADIENTS
    ============================================================ */
    .quiz-bg {
      background:
        radial-gradient(ellipse at 20% 50%, #1e1b4b 0%, transparent 50%),
        radial-gradient(ellipse at 80% 20%, #0f172a 0%, transparent 50%),
        linear-gradient(135deg, #0a0a1a 0%, #0f0a1e 30%, #1a0a2e 60%, #0a0a1a 100%);
    }
    .upload-bg {
      background:
        radial-gradient(ellipse at 30% 40%, #1a1040 0%, transparent 60%),
        radial-gradient(ellipse at 70% 70%, #0d0820 0%, transparent 60%),
        linear-gradient(180deg, #0a0a1a 0%, #100a20 100%);
    }

    /* ============================================================
       SVG OVERLAYS
    ============================================================ */
    .bg-rays {
      position: absolute; top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none; opacity: 0.08; z-index: 0;
    }
    .bg-stars {
      position: absolute; top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none; opacity: 0.35; z-index: 0;
    }

    /* ============================================================
       FULL-SCREEN CONTAINERS
    ============================================================ */
    .screen {
      width: 100%; height: 100%;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      position: relative; overflow-y: auto; overflow-x: hidden;
    }
    .quiz-screen {
      width: 100%; height: 100%;
      position: relative; overflow: hidden;
      display: flex; flex-direction: column;
    }

    /* ============================================================
       UPLOAD SCREEN
    ============================================================ */
    .upload-header { text-align: center; margin-bottom: 2rem; }

    .lrn-logo {
      font-size: 3.5rem; font-weight: 900;
      letter-spacing: -3px; font-stretch: condensed;
      color: var(--text-white); line-height: 1;
    }
    .lrn-logo-accent { color: var(--accent-magenta); }
    .upload-subtitle {
      font-size: 1.4rem; font-weight: 300;
      letter-spacing: 5px; text-transform: uppercase;
      color: rgba(248,250,252,0.55); margin-top: 0.4rem;
    }
    .upload-card {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 16px; padding: 2.5rem;
      width: 90%; max-width: 520px;
      display: flex; flex-direction: column;
      align-items: center; gap: 1.4rem;
    }
    .upload-instruction {
      color: rgba(248,250,252,0.55);
      font-size: 0.9rem; text-align: center; line-height: 1.6;
    }
    .btn-template {
      display: inline-flex; align-items: center; gap: 0.5rem;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.18);
      color: var(--text-white); padding: 0.55rem 1.1rem;
      border-radius: 8px; cursor: pointer; font-size: 0.88rem;
      transition: background 0.2s;
    }
    .btn-template:hover { background: rgba(255,255,255,0.14); }
    .dropzone {
      width: 100%; border: 2px dashed rgba(255,255,255,0.22);
      border-radius: 12px; padding: 2.2rem 1.5rem;
      display: flex; flex-direction: column;
      align-items: center; gap: 0.7rem;
      cursor: pointer; transition: all 0.2s; text-align: center;
    }
    .dropzone:hover, .dropzone.dragover {
      border-color: var(--accent-magenta);
      background: rgba(217,70,239,0.06);
    }
    .dropzone-text { font-size: 0.95rem; color: rgba(248,250,252,0.65); }
    .dropzone-sub { font-size: 0.78rem; color: rgba(248,250,252,0.35); }
    .sample-link {
      color: rgba(248,250,252,0.4); font-size: 0.82rem;
      cursor: pointer; text-decoration: underline; transition: color 0.2s;
    }
    .sample-link:hover { color: var(--accent-magenta); }
    .error-msg {
      color: var(--accent-red); font-size: 0.82rem;
      text-align: center; padding: 0.4rem 0.8rem;
      background: rgba(239,68,68,0.1); border-radius: 6px; width: 100%;
    }

    /* ============================================================
       UNIVERSAL BUTTONS
    ============================================================ */
    .btn-green {
      background: var(--accent-green); color: #fff;
      border: none; border-radius: 8px;
      padding: 0.72rem 1.8rem; font-size: 1rem; font-weight: 600;
      cursor: pointer; transition: all 0.2s;
      display: inline-flex; align-items: center; gap: 0.5rem;
    }
    .btn-green:hover { background: #16a34a; transform: translateY(-1px); }
    .btn-red {
      background: transparent; color: var(--accent-red);
      border: 1px solid var(--accent-red); border-radius: 8px;
      padding: 0.6rem 1.2rem; font-size: 0.88rem; cursor: pointer;
      transition: all 0.2s;
      display: inline-flex; align-items: center; gap: 0.45rem;
    }
    .btn-red:hover { background: rgba(239,68,68,0.1); }
    .btn-ghost {
      background: transparent; color: rgba(248,250,252,0.7);
      border: 1px solid rgba(255,255,255,0.2); border-radius: 8px;
      padding: 0.6rem 1.2rem; font-size: 0.88rem; cursor: pointer;
      transition: all 0.2s;
    }
    .btn-ghost:hover { background: rgba(255,255,255,0.07); }
    .btn-blue {
      background: var(--accent-blue); color: #fff;
      border: none; border-radius: 8px;
      padding: 0.65rem 1.4rem; font-size: 0.9rem; font-weight: 600;
      cursor: pointer; transition: background 0.2s;
    }
    .btn-blue:hover { background: #2563eb; }
    .btn-outline-white {
      background: transparent; color: rgba(248,250,252,0.75);
      border: 1px solid rgba(255,255,255,0.25); border-radius: 8px;
      padding: 0.6rem 1.2rem; font-size: 0.88rem; cursor: pointer;
      transition: all 0.2s;
    }
    .btn-outline-white:hover { background: rgba(255,255,255,0.08); }

    /* ============================================================
       SUCCESS SCREEN
    ============================================================ */
    .success-card {
      background: rgba(34,197,94,0.07);
      border: 2px solid var(--accent-green);
      border-radius: 16px; padding: 2.5rem;
      width: 90%; max-width: 460px;
      text-align: center;
      display: flex; flex-direction: column;
      align-items: center; gap: 1rem;
    }
    .success-check {
      width: 58px; height: 58px;
      background: var(--accent-green); border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.6rem; color: #fff;
    }
    .success-title { font-size: 1.8rem; font-weight: 700; color: var(--accent-green); }
    .success-sub { color: rgba(248,250,252,0.6); font-size: 0.95rem; }
    .success-actions {
      display: flex; flex-direction: column; gap: 0.7rem;
      width: 100%; align-items: center; margin-top: 0.5rem;
    }

    /* ============================================================
       SETTINGS SCREEN
    ============================================================ */
    .settings-wrapper {
      background: rgba(0,0,0,0.35);
      min-height: 100vh; width: 100%;
      display: flex; align-items: flex-start;
      justify-content: center; padding: 2rem 1rem;
      overflow-y: auto;
    }
    .settings-card {
      background: #fff; color: #1a1a2e;
      border-radius: 16px; padding: 2rem;
      width: 90%; max-width: 580px;
      display: flex; flex-direction: column; gap: 0.9rem;
      margin: auto;
    }
    .settings-heading { font-size: 1.4rem; font-weight: 700; color: #1a1a2e; }
    .settings-section-title {
      font-size: 0.72rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: 1.5px;
      color: #999; margin-top: 0.4rem;
    }
    .settings-row {
      display: flex; align-items: center;
      justify-content: space-between;
      padding: 0.7rem 0; border-bottom: 1px solid #f0f0f0;
    }
    .settings-row:last-child { border-bottom: none; }
    .settings-row-left { flex: 1; }
    .settings-row-label { font-size: 0.92rem; font-weight: 600; color: #1a1a2e; }
    .settings-row-sub { font-size: 0.77rem; color: #888; margin-top: 0.15rem; }
    .settings-row-right { display: flex; align-items: center; gap: 0.6rem; flex-shrink: 0; }

    /* Toggle switch */
    .toggle-switch { position: relative; display: inline-block; width: 44px; height: 24px; }
    .toggle-switch input { opacity: 0; width: 0; height: 0; }
    .toggle-slider {
      position: absolute; cursor: pointer;
      top: 0; left: 0; right: 0; bottom: 0;
      background: #ccc; border-radius: 24px; transition: 0.3s;
    }
    .toggle-slider::before {
      content: ''; position: absolute;
      height: 18px; width: 18px; left: 3px; bottom: 3px;
      background: #fff; border-radius: 50%; transition: 0.3s;
    }
    .toggle-switch input:checked + .toggle-slider { background: var(--accent-green); }
    .toggle-switch input:checked + .toggle-slider::before { transform: translateX(20px); }

    .settings-input {
      border: 1px solid #ddd; border-radius: 6px;
      padding: 0.38rem 0.6rem; font-size: 0.88rem;
      width: 68px; text-align: center; outline: none; color: #1a1a2e;
    }
    .settings-input:focus { border-color: var(--accent-blue); box-shadow: 0 0 0 2px rgba(59,130,246,0.15); }
    .settings-input-full {
      border: 1px solid #ddd; border-radius: 6px;
      padding: 0.5rem 0.7rem; font-size: 0.92rem;
      width: 100%; outline: none; color: #1a1a2e;
    }
    .settings-input-full:focus { border-color: var(--accent-blue); box-shadow: 0 0 0 2px rgba(59,130,246,0.15); }
    .settings-hint { font-size: 0.77rem; color: #888; }
    .settings-footer { display: flex; gap: 0.8rem; align-items: center; flex-wrap: wrap; padding-top: 0.5rem; }

    /* ============================================================
       QUIZ HEADER (shared across quiz screens)
    ============================================================ */
    .quiz-header {
      display: flex; align-items: center;
      justify-content: space-between;
      padding: clamp(0.8rem, 1.6vh, 1.4rem) clamp(1rem, 2.4vw, 2.8rem) 0.6rem;
      z-index: 2; position: relative; flex-shrink: 0;
    }
    .quiz-title-text {
      font-size: clamp(1.05rem, 1.4vw, 1.5rem); font-weight: 700;
      letter-spacing: 2px; text-transform: uppercase;
      font-stretch: condensed; flex: 1; text-align: center;
    }
    .header-spacer { min-width: 110px; }
    .score-block {
      background: var(--panel-dark);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 10px; padding: clamp(0.45rem, 0.9vh, 0.7rem) clamp(0.8rem, 1.4vw, 1.2rem);
      text-align: right; min-width: clamp(110px, 11vw, 170px);
    }
    .score-label {
      font-size: 0.6rem; font-weight: 700;
      letter-spacing: 2px; text-transform: uppercase;
      color: rgba(248,250,252,0.45);
    }
    .score-value { font-size: clamp(1.25rem, 2.1vw, 2rem); font-weight: 700; line-height: 1.1; }
    .score-passmark { font-size: 0.65rem; color: rgba(248,250,252,0.4); }

    /* ============================================================
       OPENING SCREEN
    ============================================================ */
    .opening-body {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 1rem 2rem 2rem; z-index: 2; position: relative;
      text-align: center;
    }
    .opening-quiz-name {
      font-size: clamp(1.8rem, 4.5vw, 3.2rem);
      font-weight: 900; text-transform: uppercase;
      letter-spacing: 4px; font-stretch: condensed;
      margin-bottom: 1.8rem; line-height: 1.1;
    }
    .opening-panel {
      background: var(--panel-dark);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: var(--card-radius);
      padding: 1.4rem 1.8rem; max-width: 540px;
      width: 100%; text-align: left; margin-bottom: 1.8rem;
    }
    .opening-para {
      font-size: 0.92rem; line-height: 1.7;
      color: rgba(248,250,252,0.8); margin-bottom: 0.6rem;
    }
    .opening-para:last-child { margin-bottom: 0; }
    .btn-letsgo {
      background: var(--accent-green); color: #fff;
      border: none; border-radius: 50px;
      padding: 0.85rem 2.4rem; font-size: 1.05rem; font-weight: 700;
      cursor: pointer; display: inline-flex; align-items: center; gap: 0.5rem;
      transition: all 0.2s; letter-spacing: 1px;
    }
    .btn-letsgo:hover {
      background: #16a34a; transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(34,197,94,0.35);
    }

    /* ============================================================
       QUESTION SCREEN
    ============================================================ */
    .question-body {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: clamp(1rem, 2.5vh, 2rem) clamp(1rem, 4vw, 6rem) clamp(1.6rem, 3.5vh, 3rem);
      z-index: 2; position: relative; gap: clamp(0.8rem, 2vh, 1.8rem);
      overflow-y: auto;
    }
    .question-meta {
      font-size: clamp(0.78rem, 1vw, 1rem); color: rgba(248,250,252,0.72);
      letter-spacing: 2px; text-transform: uppercase;
    }
    .question-text {
      font-size: clamp(1.25rem, 2.8vw, 2.3rem); font-weight: 700;
      text-align: center; max-width: min(96%, 1220px); line-height: 1.4;
      color: #ffffff; text-shadow: 0 1px 4px rgba(0, 0, 0, 0.35);
    }

    /* Timer */
    .timer-container {
      width: 100%; max-width: min(96%, 1220px);
      height: 6px; background: rgba(255,255,255,0.12);
      border-radius: 3px; overflow: hidden;
    }
    .timer-bar {
      height: 100%; border-radius: 3px;
      background: linear-gradient(90deg, var(--accent-green), #86efac);
      transition: width 0.12s linear;
      will-change: width;
    }
    .timer-bar.warning { background: linear-gradient(90deg, #f59e0b, #fde68a); }
    .timer-bar.danger  { background: linear-gradient(90deg, var(--accent-red), #fca5a5); }

    /* Answer cards */
    .answers-grid {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: clamp(0.65rem, 1.2vw, 1.2rem); width: 100%; max-width: min(96%, 1220px);
    }
    .answer-card {
      background: rgba(255,255,255,0.055);
      border: 2px solid rgba(255,255,255,0.1);
      border-radius: var(--card-radius);
      padding: clamp(0.8rem, 2vh, 1.35rem) clamp(0.9rem, 1.8vw, 1.6rem);
      cursor: pointer;
      display: flex; align-items: flex-start; gap: 0.65rem;
      transition: all 0.18s; text-align: left;
      position: relative; min-height: clamp(72px, 11vh, 140px);
      color: #ffffff;
    }
    .answer-card:hover:not(.locked) {
      background: rgba(255,255,255,0.1);
      border-color: rgba(255,255,255,0.28);
      transform: translateY(-1px);
    }
    .answer-card.locked { cursor: default; }
    .answer-card.correct {
      background: rgba(34,197,94,0.18);
      border-color: var(--accent-green);
    }
    .answer-card.incorrect-selected {
      background: rgba(239,68,68,0.18);
      border-color: var(--accent-red);
    }
    .answer-card.dimmed { opacity: 0.3; }
    .answer-letter {
      font-size: clamp(0.82rem, 1.1vw, 1.02rem); font-weight: 700;
      background: rgba(255,255,255,0.12);
      border-radius: 50%; width: 22px; height: 22px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; margin-top: 0.05rem;
    }
    .answer-text {
      font-size: clamp(1rem, 1.5vw, 1.35rem);
      line-height: 1.42; flex: 1;
      color: #ffffff;
    }
    .answer-icon {
      position: absolute; top: 0.45rem; right: 0.65rem;
      font-size: 1rem; line-height: 1;
    }

    /* Feedback overlay */
    .feedback-overlay {
      position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      display: flex; align-items: center; justify-content: center;
      z-index: 30; pointer-events: none;
    }
    .feedback-bubble {
      background: rgba(0,0,10,0.9);
      border: 3px solid;
      border-radius: 20px; padding: 1.4rem 3rem;
      text-align: center;
      animation: feedbackPop 0.38s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
    }
    .feedback-bubble.correct { border-color: var(--accent-green); }
    .feedback-bubble.incorrect { border-color: var(--accent-red); }
    .feedback-icon-big { font-size: 2.2rem; }
    .feedback-msg {
      font-size: 1.4rem; font-weight: 700; margin-top: 0.25rem;
    }
    .feedback-msg.correct { color: var(--accent-green); }
    .feedback-msg.incorrect { color: var(--accent-red); }

    @keyframes feedbackPop {
      from { transform: scale(0.4); opacity: 0; }
      to   { transform: scale(1);   opacity: 1; }
    }

    /* Small author download link at bottom of question screen */
    .author-download {
      position: absolute; bottom: 0.6rem; right: 1rem;
      font-size: 0.7rem; color: rgba(248,250,252,0.25);
      cursor: pointer; text-decoration: underline;
      z-index: 5;
    }
    .author-download:hover { color: rgba(248,250,252,0.5); }

    /* ============================================================
       RESULTS SCREEN
    ============================================================ */
    .results-body {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 1.5rem 2rem; z-index: 2; position: relative;
      text-align: center; gap: 0.7rem;
    }
    .results-trophy { font-size: 3.5rem; line-height: 1; }
    .results-title {
      font-size: clamp(1.8rem, 4vw, 2.8rem); font-weight: 900;
      text-transform: uppercase; letter-spacing: 3px;
    }
    .results-title.pass { color: var(--accent-green); }
    .results-title.fail { color: var(--accent-red); }
    .results-score-label {
      font-size: 0.8rem; color: rgba(248,250,252,0.5);
      text-transform: uppercase; letter-spacing: 2px;
    }
    .results-score {
      font-size: clamp(3rem, 8vw, 4.5rem); font-weight: 900; line-height: 1;
    }
    .results-score.pass { color: var(--accent-green); }
    .results-score.fail { color: var(--accent-red); }
    .results-opening-text { color: rgba(248,250,252,0.75); font-size: 0.95rem; }
    .results-body-text {
      color: rgba(248,250,252,0.5); font-size: 0.87rem;
      max-width: 380px; line-height: 1.5;
    }
    .results-buttons { display: flex; gap: 0.7rem; flex-wrap: wrap; justify-content: center; margin-top: 0.5rem; }

    /* ============================================================
       REVIEW SCREEN
    ============================================================ */
    .review-screen-wrap {
      width: 100%; height: 100%;
      display: flex; flex-direction: column; overflow: hidden;
    }
    .review-scroll {
      flex: 1; overflow-y: auto; padding: 1rem 1.5rem 2rem;
    }
    .review-heading {
      font-size: 1.4rem; font-weight: 700;
      color: var(--accent-blue);
      text-align: center; margin-bottom: 1.2rem;
    }
    .review-card {
      background: rgba(255,255,255,0.92);
      color: #1a1a2e; border-radius: 10px;
      padding: 1.2rem 1.4rem;
      max-width: 660px; margin: 0 auto 0.9rem;
    }
    .review-q-num {
      font-size: 0.72rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: 1.2px;
      color: #888; margin-bottom: 0.3rem;
    }
    .review-q-text {
      font-size: 0.9rem; font-weight: 600;
      color: #111; margin-bottom: 0.7rem; line-height: 1.4;
    }
    .review-opt {
      display: flex; align-items: flex-start; gap: 0.45rem;
      padding: 0.32rem 0.5rem; border-radius: 5px;
      margin-bottom: 0.25rem; font-size: 0.83rem; line-height: 1.4;
    }
    .review-opt.sel-correct  { background: rgba(34,197,94,0.15); color: #14532d; font-weight: 600; }
    .review-opt.sel-wrong    { background: rgba(239,68,68,0.12); color: #7f1d1d; }
    .review-opt.ans-correct  { background: rgba(34,197,94,0.08); color: #14532d; }
    .review-opt-ltr { font-weight: 700; min-width: 16px; flex-shrink: 0; }
    .review-buttons {
      display: flex; gap: 0.7rem; justify-content: center;
      flex-wrap: wrap; margin-top: 1rem; padding-bottom: 1rem;
    }

    /* ============================================================
       CLOSED SCREEN
    ============================================================ */
    .closed-wrap {
      width: 100%; height: 100%;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 1rem;
      text-align: center;
    }
    .closed-icon { font-size: 3rem; opacity: 0.4; }
    .closed-title { font-size: 2rem; font-weight: 700; opacity: 0.55; }
    .closed-sub { font-size: 0.9rem; color: rgba(248,250,252,0.3); }

    /* ============================================================
       EDIT QUIZ TAB (left vertical tab)
    ============================================================ */
    .edit-quiz-tab {
      position: fixed; left: 0; top: 50%;
      transform: translateY(-50%);
      z-index: 15;
    }
    .edit-quiz-tab-btn {
      background: var(--accent-magenta); color: #fff;
      border: none; border-radius: 0 8px 8px 0;
      padding: 1rem 0.5rem; cursor: pointer;
      writing-mode: vertical-rl; text-orientation: mixed;
      transform: rotate(180deg);
      font-size: 0.72rem; font-weight: 700;
      letter-spacing: 3px; text-transform: uppercase;
      transition: background 0.2s; outline: none;
    }

<body>
  <div id="app"></div>

  <script>
  /* ============================================================
     SAMPLE DATA - 10 compliance questions
  ============================================================ */
  const SAMPLE_QUESTIONS = [
    {

    {

      ],

    },
    {

      options: [
        'It helps the company avoid paying taxes',
        'It protects personal information and builds stakeholder trust',
        'It reduces the need for cybersecurity tools',
        'It is only relevant for the IT department'
      ],
      correctIndex: 1
    },
    {
      question: 'Which of the following is an example of a bribe?',
      options: [
        'Providing a detailed proposal to win a contract',
        'Offering a discount to a customer for early payment',
        'Paying a government official to approve a permit quickly',
        'Giving an employee a bonus for outstanding performance'
      ],
      correctIndex: 2
    }
  ];

  /* ============================================================
     STATE
  ============================================================ */
  const state = {
    screen: 'upload',
    questions: [],
    settings: {
      quizName: 'Compliance Quiz',
      shuffleQuestions: false,
      shuffleAnswers: false,
      timerEnabled: true,
      timerSeconds: 10,
      passmarkEnabled: true,
      passmarkValue: 80,
      correctMessages: ['Great work!', 'Nice job!', 'Well done!', 'Spot on!'],
      incorrectMessages: ['Unlucky!', 'Tough luck!', 'Not this time!', 'Missed it!']
    },
    openingParagraphs: [],
    openingManuallyEdited: false,
    resultsCopy: {
      pass: { title: 'Congratulations!', opening: 'You have passed the quiz.', body: '' },
      fail: { title: 'Unlucky!', opening: 'You have not passed the quiz.', body: '' }
    },
    attempt: {
      answers: [],
      correctCount: 0,
      currentQuestionIndex: 0,
      questionOrder: [],
      answerOrders: [],
      complete: false
    },
    drawerOpen: false,
    drawerTab: 'opening',
    feedbackState: null,
    feedbackMessage: ''
  };

  /* timer stored globally so it can be cleared anywhere */
  window.quizTimer = null;
  /* flag to prevent double-advancing */
  window.answerLocked = false;

  /* ============================================================
     UTILITY FUNCTIONS
  ============================================================ */

  /** Fisher-Yates shuffle - returns new array */
  function shuffle(arr) {
    const a = [...arr];
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }

  /** Pick a random element from an array */
  function pick(arr) {
    return arr[Math.floor(Math.random() * arr.length)];
  }

  /** Generate opening paragraphs from settings (only when not manually edited) */
  function generateOpeningParagraphs() {
    const s = state.settings;
    const n = state.questions.length;
    const paras = [];
    paras.push(`Welcome to the ${s.quizName}.`);
    paras.push(`This quiz contains ${n} question${n !== 1 ? 's' : ''}.`);
    if (s.timerEnabled) {
      const total = n * s.timerSeconds;
      paras.push(`Each question has a ${s.timerSeconds}-second time limit. Total time allowed: ${total} seconds.`);
    }
    if (s.passmarkEnabled) {
      paras.push(`You need to score ${s.passmarkValue}% or more to pass.`);
    }
    paras.push('Good luck!');
    return paras;
  }

  /** Compute running score percentage (out of total questions in quiz) */
  function getScorePercent() {
    const total = state.attempt.questionOrder.length;
    if (total === 0) return 0;
    return Math.round((state.attempt.correctCount / total) * 100);
  }

  /** Initialise attempt state */
  function initAttempt() {
    const n = state.questions.length;
    const qOrder = state.settings.shuffleQuestions
      ? shuffle([...Array(n).keys()])
      : [...Array(n).keys()];

    const aOrders = qOrder.map(() =>
      state.settings.shuffleAnswers
        ? shuffle([0, 1, 2, 3])
        : [0, 1, 2, 3]
    );

    state.attempt = {
      answers: [],
      correctCount: 0,
      currentQuestionIndex: 0,
      questionOrder: qOrder,
      answerOrders: aOrders,
      complete: false
    };
    window.answerLocked = false;
  }

  /* ---- CSV helpers ---- */

  /** Parse a CSV line respecting quoted fields */
  function parseCSVLine(line) {
    const cols = [];
    let cur = '';
    let inQ = false;
    for (let i = 0; i < line.length; i++) {
      const ch = line[i];
      if (ch === '"') {
        // Handle escaped quotes ""
        if (inQ && i + 1 < line.length && line[i + 1] === '"') { cur += '"'; i++; }
        else inQ = !inQ;
      } else if (ch === ',' && !inQ) {
        cols.push(cur); cur = '';
      } else {
        cur += ch;
      }
    }
    cols.push(cur);
    return cols;
  }

  /** Parse full CSV text into question objects; returns {questions} or {error} */
  function parseCSV(text) {
    const lines = text.replace(/\r\n/g, '\n').replace(/\r/g, '\n').trim().split('\n');
    if (lines.length < 2) return { error: 'CSV must have a header row and at least one data row.' };

    const headers = parseCSVLine(lines[0]).map(h => h.trim().toLowerCase().replace(/"/g, ''));

    const required = ['question', 'option_a', 'option_b', 'option_c', 'option_d', 'correct_option'];
    for (const req of required) {
      if (!headers.includes(req)) return { error: `Missing required column: "${req}"` };
    }

    const idx = {
      q: headers.indexOf('question'),
      a: headers.indexOf('option_a'),
      b: headers.indexOf('option_b'),
      c: headers.indexOf('option_c'),
      d: headers.indexOf('option_d'),
      corr: headers.indexOf('correct_option')
    };

    const questions = [];
    for (let i = 1; i < lines.length; i++) {
      const line = lines[i].trim();
      if (!line) continue;
      const cols = parseCSVLine(line);
      const q    = (cols[idx.q]    || '').trim();
      const optA = (cols[idx.a]    || '').trim();
      const optB = (cols[idx.b]    || '').trim();
      const optC = (cols[idx.c]    || '').trim();
      const optD = (cols[idx.d]    || '').trim();
      const corr = (cols[idx.corr] || '').trim().toUpperCase();

      if (!q || !optA || !optB || !optC || !optD)
        return { error: `Row ${i + 1} has one or more empty fields.` };
      if (!['A','B','C','D'].includes(corr))
        return { error: `Row ${i + 1}: correct_option must be A, B, C, or D (got "${corr}").` };

      questions.push({
        question: q,
        options: [optA, optB, optC, optD],
        correctIndex: { A: 0, B: 1, C: 2, D: 3 }[corr]
      });
    }

    if (questions.length === 0) return { error: 'No valid questions found in the CSV.' };
    return { questions };
  }

  /** Escape a CSV field */
  function csvField(val) {
    const s = String(val);
    if (s.includes(',') || s.includes('"') || s.includes('\n')) {
      return '"' + s.replace(/"/g, '""') + '"';
    }
    return s;
  }

  /** Trigger browser CSV download */
  function downloadCSV(filename, csvContent) {
    const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
    const url  = URL.createObjectURL(blob);
    const link = document.createElement('a');
    link.href     = url;
    link.download = filename;
    link.click();
    URL.revokeObjectURL(url);
  }

  /** Build template CSV string */
  function buildTemplateCSV() {
    const header = 'question,option_a,option_b,option_c,option_d,correct_option\n';
    const r1 = 'Which of the following is a potential conflict of interest?,Reporting a workplace hazard,Accepting a gift from a vendor whose contract you approve,Taking annual leave,Attending a training session,B\n';
    const r2 = 'What is the primary purpose of a Code of Conduct?,Outline salary structures,Guide employee behavior and decision-making,Describe marketing strategy,List products and services,B\n';
    return header + r1 + r2;
  }

  /** Build export CSV from current questions */
  function buildQuestionsCSV() {
    const letters = ['A','B','C','D'];
    let csv = 'question,option_a,option_b,option_c,option_d,correct_option\n';
    for (const q of state.questions) {
      csv += [
        csvField(q.question),
        csvField(q.options[0]),
        csvField(q.options[1]),
        csvField(q.options[2]),
        csvField(q.options[3]),
        letters[q.correctIndex]
      ].join(',') + '\n';
    }
    return csv;
  }

  /* ============================================================
     SVG HELPERS
  ============================================================ */

  function svgRays() {
    // Rays radiating from center of viewport
    const lines = [];
    for (let i = 0; i < 24; i++) {
      const angle = (i / 24) * 360;
      const rad = (angle * Math.PI) / 180;
      const x2 = 500 + Math.cos(rad) * 700;
      const y2 = 400 + Math.sin(rad) * 700;
      lines.push(`<line x1="500" y1="400" x2="${x2.toFixed(1)}" y2="${y2.toFixed(1)}" stroke="white" stroke-width="1"/>`);
    }
    return `<svg class="bg-rays" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 800" preserveAspectRatio="xMidYMid slice">${lines.join('')}</svg>`;
  }

  function svgStars() {
    // Randomly placed star dots
    const dots = [
      [8,12],[15,75],[22,35],[30,55],[42,18],[50,88],[60,40],[70,10],[80,65],[90,30],
      [5,50],[25,92],[35,20],[45,70],[55,5],[65,80],[75,45],[85,15],[95,60],[12,38],
      [48,58],[33,83],[18,25],[63,50],[88,72],[3,67],[57,22],[77,90],[40,3],[20,48]
    ];
    const circles = dots.map(([x, y]) => {
      const r = (Math.random() * 1.2 + 0.4).toFixed(2);
      const op = (Math.random() * 0.6 + 0.3).toFixed(2);
      return `<circle cx="${x}%" cy="${y}%" r="${r}" fill="white" opacity="${op}"/>`;
    });
    return `<svg class="bg-stars" xmlns="http://www.w3.org/2000/svg">${circles.join('')}</svg>`;
  }

  /* ============================================================
     RENDER ENGINE
  ============================================================ */

  function render() {
    /* Clear any running timer */
    if (window.quizTimer) {
      clearInterval(window.quizTimer);
      window.quizTimer = null;
    }

    const app = document.getElementById('app');
    app.innerHTML = '';

    /* Render the current screen */
    switch (state.screen) {
      case 'upload':   renderUpload(app);   break;
      case 'success':  renderSuccess(app);  break;
      case 'settings': renderSettings(app); break;
      case 'opening':  renderOpening(app);  break;
      case 'question': renderQuestion(app); break;
      case 'results':  renderResults(app);  break;
      case 'review':   renderReview(app);   break;
      case 'closed':   renderClosed(app);   break;
    }

    /* Overlay drawer on top if open */
    if (state.drawerOpen) renderDrawer(app);
  }

  /* ============================================================
     UPLOAD SCREEN
  ============================================================ */

  function renderUpload(container) {
    const div = document.createElement('div');
    div.className = 'screen upload-bg';
    div.innerHTML = `
      ${svgStars()}
      <div style="position:relative;z-index:2;width:100%;display:flex;flex-direction:column;align-items:center;padding:2rem 1rem;">
        <div class="upload-header">
          <div class="lrn-logo">L<span class="lrn-logo-accent">R</span>N</div>
          <div class="upload-subtitle">Quiz Builder</div>
        </div>
        <div class="upload-card">
          <p class="upload-instruction">
            Upload a CSV file to generate a quiz. Each row should represent one question with four answer options.
          </p>
          <button class="btn-template" id="btn-dl-template">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
            Download CSV template
          </button>
          <div class="dropzone" id="dropzone" tabindex="0" role="button" aria-label="Upload CSV file">
            <svg class="dropzone-icon" width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="rgba(248,250,252,0.5)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="16 16 12 12 8 16"/><line x1="12" y1="12" x2="12" y2="21"/><path d="M20.39 18.39A5 5 0 0 0 18 9h-1.26A8 8 0 1 0 3 16.3"/></svg>
            <div class="dropzone-text">Drag &amp; drop your CSV file here</div>
            <div class="dropzone-sub">or click to browse</div>
          </div>
          <input type="file" id="file-input" accept=".csv,text/csv" style="display:none" />
          <span class="sample-link" id="btn-sample">Or use sample compliance quiz data</span>
          <span class="version" id="version">v 1.0.2</span>
          <div class="error-msg" id="upload-error" style="display:none"></div>
        </div>
      </div>
    `;
    container.appendChild(div);

    /* Event bindings */
    div.querySelector('#btn-dl-template').addEventListener('click', () => {
      downloadCSV('quiz_template.csv', buildTemplateCSV());
    });

    const dropzone  = div.querySelector('#dropzone');
    const fileInput = div.querySelector('#file-input');

    dropzone.addEventListener('click', () => fileInput.click());
    dropzone.addEventListener('keydown', e => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); fileInput.click(); } });

    dropzone.addEventListener('dragover', e => { e.preventDefault(); dropzone.classList.add('dragover'); });
    dropzone.addEventListener('dragleave', ()  => dropzone.classList.remove('dragover'));
    dropzone.addEventListener('drop', e => {
      e.preventDefault();
      dropzone.classList.remove('dragover');
      const file = e.dataTransfer.files[0];
      if (file) handleCSVFile(file);
    });

    fileInput.addEventListener('change', e => {
      if (e.target.files[0]) handleCSVFile(e.target.files[0]);
    });

    div.querySelector('#btn-sample').addEventListener('click', () => {
      loadQuestions([...SAMPLE_QUESTIONS.map(q => ({ ...q, options: [...q.options] }))]);
    });
  }

  function handleCSVFile(file) {
    const reader = new FileReader();
    reader.onload = e => {
      const result = parseCSV(e.target.result);
      if (result.error) {
        const errEl = document.getElementById('upload-error');
        errEl.textContent = result.error;
        errEl.style.display = 'block';
      } else {
        loadQuestions(result.questions);
      }
    };
    reader.readAsText(file);
  }

    state.questions = questions;
    if (!state.openingManuallyEdited) {
      state.openingParagraphs = generateOpeningParagraphs();
    }
    state.screen = 'success';
    render();
  }

  /* ============================================================
     QUESTION SCREEN
  ============================================================ */

  function renderQuestion(container) {
    const attempt = state.attempt;
    const qIdx    = attempt.questionOrder[attempt.currentQuestionIndex];
    const q       = state.questions[qIdx];
    const aOrder  = attempt.answerOrders[attempt.currentQuestionIndex];
    const totalQ  = attempt.questionOrder.length;
    const qNum    = attempt.currentQuestionIndex + 1;
    const letters = ['A', 'B', 'C', 'D'];
    const scorePercent = getScorePercent();
    const passmark = state.settings.passmarkEnabled ? state.settings.passmarkValue : null;

    const div = document.createElement('div');
    div.className = 'quiz-screen quiz-bg';
    div.innerHTML = `
      ${svgRays()}
      ${svgStars()}
      <div class="quiz-header">
        <div class="header-spacer"></div>
        <div class="quiz-title-text">${escHtml(state.settings.quizName)}</div>
        <div class="score-block">
          <div class="score-label">Your Score</div>

        </div>
      </div>
      <div class="question-body">
        <div class="question-meta">Question ${qNum} of ${totalQ}</div>
        <div class="question-text">${escHtml(q.question)}</div>
        ${state.settings.timerEnabled ? `
          <div class="timer-container">
            <div class="timer-bar" id="timer-bar" style="width:100%"></div>
          </div>` : ''}
        <div class="answers-grid" id="answers-grid">
          ${aOrder.map((origIdx, displayPos) => `
            <button class="answer-card" data-display-pos="${displayPos}" data-orig-idx="${origIdx}">
              <span class="answer-letter">${letters[displayPos]}</span>
              <span class="answer-text">${escHtml(q.options[origIdx])}</span>
            </button>
          `).join('')}
        </div>
      </div>
      <div class="edit-quiz-tab" id="edit-tab-placeholder"></div>
      <div class="lrn-brand" id="brand-placeholder"></div>
      <button class="author-download" id="btn-author-dl">Download CSV template</button>
    `;
    container.appendChild(div);

    renderEditTab(container, 'questions');
    renderBranding(container);

    div.querySelector('#btn-author-dl').addEventListener('click', () => {
      downloadCSV('quiz_template.csv', buildTemplateCSV());
    });

    /* Answer card click handler */
    div.querySelector('#answers-grid').addEventListener('click', e => {
      if (window.answerLocked) return;
      const card = e.target.closest('.answer-card');
      if (!card) return;
      const displayPos = parseInt(card.dataset.displayPos);
      const origIdx    = parseInt(card.dataset.origIdx);
      handleAnswer(displayPos, origIdx);
    });

    /* Start timer */
    if (state.settings.timerEnabled) {
      startTimer();
    }

    /* If feedback state is set (coming back after an answer), show feedback */
    if (state.feedbackState) {
      showFeedbackOverlay(state.feedbackState, state.feedbackMessage);
    }
  }

  /** Handle a user selecting an answer */
  function handleAnswer(displayPos, selectedOrigIdx) {
    if (window.answerLocked) return;
    window.answerLocked = true;

    /* Stop timer */
    if (window.quizTimer) {
      clearInterval(window.quizTimer);
      window.quizTimer = null;
    }

    const attempt    = state.attempt;
    const qIdx       = attempt.questionOrder[attempt.currentQuestionIndex];
    const q          = state.questions[qIdx];
    const correctIdx = q.correctIndex;
    const isCorrect  = selectedOrigIdx === correctIdx;

    if (isCorrect) attempt.correctCount++;

    attempt.answers.push({
      questionIndex:       qIdx,
      selectedOriginalIndex: selectedOrigIdx,
      correctOriginalIndex:  correctIdx,
      isCorrect,
      timedOut: false
    });

    /* Update score display */
    const scoreEl = document.getElementById('score-val');
    if (scoreEl) scoreEl.textContent = getScorePercent() + '%';

    /* Lock and style answer cards */
    const cards = document.querySelectorAll('.answer-card');
    cards.forEach(card => {
      card.classList.add('locked');
      const orig = parseInt(card.dataset.origIdx);
      if (orig === correctIdx) {
        card.classList.add('correct');
        card.innerHTML += '<span class="answer-icon">✓</span>';
      } else if (parseInt(card.dataset.displayPos) === displayPos && !isCorrect) {
        card.classList.add('incorrect-selected');
        card.innerHTML += '<span class="answer-icon">✗</span>';
      } else {
        card.classList.add('dimmed');
      }
    });

    /* Show feedback */
    const msg = isCorrect
      ? pick(state.settings.correctMessages)
      : pick(state.settings.incorrectMessages);
    state.feedbackState   = isCorrect ? 'correct' : 'incorrect';
    state.feedbackMessage = msg;
    showFeedbackOverlay(state.feedbackState, msg);

    /* Advance after 2 seconds */
    setTimeout(() => {
      advanceQuestion();
    }, 2000);
  }

  /** Timer countdown for question screen */
  function startTimer() {
    const duration = state.settings.timerSeconds * 1000;
    const start    = Date.now();

    window.quizTimer = setInterval(() => {
      if (window.answerLocked) {
        clearInterval(window.quizTimer);
        window.quizTimer = null;
        return;
      }
      const elapsed   = Date.now() - start;
      const remaining = Math.max(0, duration - elapsed);
      const pct       = (remaining / duration) * 100;

      const bar = document.getElementById('timer-bar');
      if (bar) {
        bar.style.width = pct + '%';
        bar.classList.remove('warning', 'danger');
        if (pct < 25) bar.classList.add('danger');
        else if (pct < 55) bar.classList.add('warning');
      }

      if (remaining <= 0) {
        clearInterval(window.quizTimer);
        window.quizTimer = null;
        onTimerExpire();
      }
    }, /* update interval ms */ 80);
  }

  /** Called when question timer runs out */
  function onTimerExpire() {
    if (window.answerLocked) return;
    window.answerLocked = true;

    const attempt    = state.attempt;
    const qIdx       = attempt.questionOrder[attempt.currentQuestionIndex];
    const correctIdx = state.questions[qIdx].correctIndex;

    attempt.answers.push({
      questionIndex:         qIdx,
      selectedOriginalIndex: -1,  /* -1 = timed out, no selection */
      correctOriginalIndex:  correctIdx,
      isCorrect:  false,
      timedOut:   true
    });

    /* Reveal correct answer on cards */
    const cards = document.querySelectorAll('.answer-card');
    cards.forEach(card => {
      card.classList.add('locked');
      if (parseInt(card.dataset.origIdx) === correctIdx) {
        card.classList.add('correct');
        card.innerHTML += '<span class="answer-icon">✓</span>';
      } else {
        card.classList.add('dimmed');
      }
    });

    const msg = pick(state.settings.incorrectMessages);
    state.feedbackState   = 'incorrect';
    state.feedbackMessage = msg;
    showFeedbackOverlay('incorrect', msg);

    setTimeout(() => advanceQuestion(), 2000);
  }

  /** Move to next question or end quiz */
  function advanceQuestion() {
    state.feedbackState   = null;
    state.feedbackMessage = '';
    window.answerLocked   = false;

    const attempt = state.attempt;
    attempt.currentQuestionIndex++;

    if (attempt.currentQuestionIndex >= attempt.questionOrder.length) {
      attempt.complete = true;
      state.screen = 'results';
    } else {
      state.screen = 'question';
    }
    render();
  }

  /** Show floating feedback overlay (appended to #app) */
  function showFeedbackOverlay(type, msg) {
    const existing = document.querySelector('.feedback-overlay');
    if (existing) existing.remove();
    const icon = type === 'correct' ? '✓' : '✗';
    const el   = document.createElement('div');
    el.className = 'feedback-overlay';
    el.innerHTML = `
      <div class="feedback-bubble ${type}">
        <div class="feedback-icon-big">${icon}</div>
        <div class="feedback-msg ${type}">${escHtml(msg)}</div>
      </div>
    `;
    document.getElementById('app').appendChild(el);
  }

  /* ============================================================
     RESULTS SCREEN
  ============================================================ */

  function renderResults(container) {
    const scorePercent = getScorePercent();

      ? scorePercent >= state.settings.passmarkValue

        ${rc.body    ? `<div class="results-body-text">${escHtml(rc.body)}</div>`       : ''}

  /* ============================================================
     REVIEW SCREEN
  ============================================================ */

  function renderReview(container) {
    const attempt  = state.attempt;
    const letters  = ['A','B','C','D'];

    /* Build a map: questionIndex → answer record */
    const answerMap = {};
    attempt.answers.forEach(a => { answerMap[a.questionIndex] = a; });

    const cardsHtml = attempt.questionOrder.map((qIdx, pos) => {
      const q    = state.questions[qIdx];
      const ans  = answerMap[qIdx];
      const aOrd = attempt.answerOrders[pos]; /* order of options as shown */

      const optsHtml = aOrd.map((origIdx, dPos) => {
        const isSelected = ans && ans.selectedOriginalIndex === origIdx;
        const isCorrect  = origIdx === q.correctIndex;
        let cls = '';
        let icon = '';
        if (isSelected && isCorrect)  { cls = 'sel-correct';  icon = ' ✓'; }
        else if (isSelected && !isCorrect) { cls = 'sel-wrong'; icon = ' ✗'; }
        else if (!isSelected && isCorrect) { cls = 'ans-correct'; icon = ' ✓'; }
        return `<div class="review-opt ${cls}">
          <span class="review-opt-ltr">${letters[dPos]}.</span>
          <span>${escHtml(q.options[origIdx])}</span>
          ${icon ? `<span style="margin-left:auto;font-weight:700;">${icon}</span>` : ''}
        </div>`;
      }).join('');

      const timedOut = ans && ans.timedOut ? ' <em style="color:#888;font-size:0.75rem;">(timed out)</em>' : '';

      return `<div class="review-card">
        <div class="review-q-num">Question ${pos + 1}</div>
        <div class="review-q-text">${escHtml(q.question)}${timedOut}</div>
        ${optsHtml}
      </div>`;
    }).join('');

    const div = document.createElement('div');
    div.className = 'quiz-screen quiz-bg';
    div.innerHTML = `
      ${svgRays()}
      <div class="review-screen-wrap" style="position:relative;z-index:2;">
        <div class="quiz-header" style="justify-content:center;flex-shrink:0;">
          <div class="quiz-title-text">${escHtml(state.settings.quizName)}</div>
        </div>
        <div class="review-scroll">
          <div class="review-heading">Review Answers</div>
          ${cardsHtml}
          <div class="review-buttons">
            <button class="btn-ghost" id="btn-back-score">← Back to Score</button>
            <button class="btn-ghost" id="btn-retake-review">Retake Quiz</button>
            <button class="btn-outline-white" id="btn-close-review">Close Quiz</button>
          </div>
        </div>
      </div>
    `;
    container.appendChild(div);

    renderEditTab(container, 'results');
    renderBranding(container);

    div.querySelector('#btn-back-score').addEventListener('click', () => {
      state.screen = 'results';
      render();
    });
    div.querySelector('#btn-retake-review').addEventListener('click', () => {
      initAttempt();
      state.feedbackState = null;
      state.feedbackMessage = '';
      state.screen = 'question';
      render();
    });
    div.querySelector('#btn-close-review').addEventListener('click', () => {
      state.screen = 'closed';
      render();
    });
  }

  /* ============================================================
     CLOSED SCREEN
  ============================================================ */

  function renderClosed(container) {
    const div = document.createElement('div');
    div.className = 'quiz-bg';
    div.style.cssText = 'width:100%;height:100%;';
    div.innerHTML = `
      ${svgStars()}
      <div class="closed-wrap" style="position:relative;z-index:2;">
        <div class="closed-icon">🔒</div>
        <div class="closed-title">Quiz Closed</div>
        <div class="closed-sub">This quiz session has ended.</div>
        <button class="btn-green" id="btn-restart" style="margin-top:1rem;">
          Start a New Quiz
        </button>
      </div>
    `;
    container.appendChild(div);

    div.querySelector('#btn-restart').addEventListener('click', () => {
      state.questions = [];
      state.openingParagraphs = [];
      state.openingManuallyEdited = false;
      state.attempt = { answers:[], correctCount:0, currentQuestionIndex:0, questionOrder:[], answerOrders:[], complete:false };
      state.screen = 'upload';
      render();
    });
  }

  /* ============================================================
     EDIT QUIZ TAB
  ============================================================ */

  function renderEditTab(container, defaultTab) {
    const btn = document.createElement('div');
    btn.className = 'edit-quiz-tab';
    btn.innerHTML = `<button class="edit-quiz-tab-btn" id="open-drawer-btn">Edit Quiz</button>`;
    container.appendChild(btn);

    btn.querySelector('#open-drawer-btn').addEventListener('click', () => {
      state.drawerOpen = true;
      state.drawerTab  = defaultTab || 'opening';
      render();
    });
  }

  /* ============================================================
     LRN BRANDING
  ============================================================ */

  function renderBranding(container) {
    const el = document.createElement('div');
    el.className = 'lrn-brand';
    el.innerHTML = `
      <div class="lrn-brand-logo">LRN</div>
      <div class="lrn-brand-sub">Quiz Builder</div>
    `;
    container.appendChild(el);
  }

  /* ============================================================
     EDIT DRAWER
  ============================================================ */

  function renderDrawer(container) {
    /* Dim overlay */
    const overlay = document.createElement('div');
    overlay.className = 'drawer-overlay';
    overlay.addEventListener('click', () => {
      state.drawerOpen = false;
      render();
    });
    container.appendChild(overlay);

    /* Drawer panel */
    const drawer = document.createElement('div');
    drawer.className = 'drawer';
    drawer.innerHTML = `
      <div class="drawer-top">
        <div class="drawer-brand">L<span>R</span>N Quiz Builder</div>
        <button class="drawer-close" id="drawer-close-btn" title="Close drawer">✕</button>
      </div>
      <div class="drawer-tabs">
        ${['opening','questions','results','settings'].map(tab => `
          <button class="drawer-tab-btn ${state.drawerTab === tab ? 'active' : ''}" data-tab="${tab}">
            ${{ opening:'Opening', questions:'Questions', results:'Results', settings:'Settings' }[tab]}
          </button>
        `).join('')}
      </div>
      <div class="drawer-body" id="drawer-body"></div>
    `;
    container.appendChild(drawer);

    /* Prevent overlay click propagating from drawer */
    drawer.addEventListener('click', e => e.stopPropagation());

    drawer.querySelector('#drawer-close-btn').addEventListener('click', () => {
      state.drawerOpen = false;
      render();
    });

    /* Tab switching */
    drawer.querySelectorAll('.drawer-tab-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        state.drawerTab = btn.dataset.tab;
        render();
      });
    });

    /* Render tab content */
    const body = drawer.querySelector('#drawer-body');
    switch (state.drawerTab) {
      case 'opening':   renderDrawerOpening(body);   break;
      case 'questions': renderDrawerQuestions(body); break;
      case 'results':   renderDrawerResults(body);   break;
      case 'settings':  renderDrawerSettings(body);  break;
    }
  }

  /* ---- Drawer: Opening Tab ---- */
  function renderDrawerOpening(body) {
    body.innerHTML = `<div class="drawer-section-title">Edit Opening</div>`;

    /* Ensure at least some paragraphs exist */
    if (!state.openingParagraphs.length) {
      state.openingParagraphs = generateOpeningParagraphs();
    }

    const paras = state.openingParagraphs;

    paras.forEach((para, i) => {
      const row = document.createElement('div');
      row.className = 'para-row';
      row.innerHTML = `
        <textarea class="drawer-textarea para-input" data-idx="${i}" rows="2">${escHtml(para)}</textarea>
        <button class="btn-del-para" data-del-idx="${i}" title="Delete paragraph">✕</button>
      `;
      body.appendChild(row);
    });

    const addBtn = document.createElement('button');
    addBtn.className = 'btn-add-para';
    addBtn.textContent = '+ Add paragraph';
    body.appendChild(addBtn);

    /* Live update */
    body.querySelectorAll('.para-input').forEach(ta => {
      ta.addEventListener('input', e => {
        const idx = parseInt(e.target.dataset.idx);
        state.openingParagraphs[idx] = e.target.value;
        state.openingManuallyEdited = true;
      });
    });

    body.querySelectorAll('.btn-del-para').forEach(btn => {
      btn.addEventListener('click', e => {
        const idx = parseInt(e.currentTarget.dataset.delIdx);
        state.openingParagraphs.splice(idx, 1);
        state.openingManuallyEdited = true;
        render();
      });
    });

    addBtn.addEventListener('click', () => {
      state.openingParagraphs.push('');
      state.openingManuallyEdited = true;
      render();
    });
  }

  /* ---- Drawer: Questions Tab ---- */
  function renderDrawerQuestions(body) {
    body.innerHTML = `<div class="drawer-section-title">Edit Questions</div>`;

    const dlBtn = document.createElement('button');
    dlBtn.className = 'drawer-dl-btn';
    dlBtn.innerHTML = `
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      Download as CSV file
    `;
    dlBtn.addEventListener('click', () => {
      downloadCSV('quiz_questions.csv', buildQuestionsCSV());
    });
    body.appendChild(dlBtn);

    state.questions.forEach((q, qi) => {
      const card = document.createElement('div');
      card.className = 'drawer-q-card';

      const optRows = q.options.map((opt, oi) => `
        <div class="drawer-opt-row">
          <span class="drawer-opt-lbl">${['A','B','C','D'][oi]}</span>
          <input class="drawer-opt-input" type="text" data-qi="${qi}" data-oi="${oi}" value="${escHtml(opt)}" />
          <input class="drawer-opt-radio" type="radio" name="correct-${qi}" value="${oi}" ${q.correctIndex === oi ? 'checked' : ''} data-qi="${qi}" data-val="${oi}" title="Mark as correct" />
        </div>
      `).join('');

      card.innerHTML = `
        <div class="drawer-q-num">Q${qi + 1}</div>
        <textarea class="drawer-textarea" rows="2" data-qi-q="${qi}">${escHtml(q.question)}</textarea>
        ${optRows}
      `;
      body.appendChild(card);

      /* Question text */
      card.querySelector(`[data-qi-q="${qi}"]`).addEventListener('input', e => {
        state.questions[qi].question = e.target.value;
      });

      /* Option text */
      card.querySelectorAll('.drawer-opt-input').forEach(inp => {
        inp.addEventListener('input', e => {
          state.questions[parseInt(e.target.dataset.qi)].options[parseInt(e.target.dataset.oi)] = e.target.value;
        });
      });

      /* Correct answer radio */
      card.querySelectorAll('.drawer-opt-radio').forEach(radio => {
        radio.addEventListener('change', e => {
          state.questions[e.target.dataset.qi].correctIndex = parseInt(e.target.dataset.val);
        });
      });
    });
  }

  /* ---- Drawer: Results Tab ---- */
  function renderDrawerResults(body) {
    body.innerHTML = `<div class="drawer-section-title">Edit Results Page</div>`;

    ['pass','fail'].forEach(outcome => {
      const rc  = state.resultsCopy[outcome];
      const lbl = outcome === 'pass' ? 'Pass State (score ≥ passmark)' : 'Fail State (score < passmark)';

      const block = document.createElement('div');
      block.className = 'drawer-results-block';
      block.innerHTML = `
        <div class="drawer-results-blk-lbl ${outcome}">${lbl}</div>
        <div class="drawer-label">Title</div>
        <input class="drawer-input" type="text" data-rc="${outcome}" data-field="title" value="${escHtml(rc.title)}" style="margin-bottom:0.45rem;" />
        <div class="drawer-label">Opening text</div>
        <input class="drawer-input" type="text" data-rc="${outcome}" data-field="opening" value="${escHtml(rc.opening)}" style="margin-bottom:0.45rem;" />
        <div class="drawer-label">Body (optional)</div>
        <textarea class="drawer-textarea" data-rc="${outcome}" data-field="body" rows="2">${escHtml(rc.body)}</textarea>
      `;
      body.appendChild(block);

      block.querySelectorAll('[data-rc]').forEach(el => {
        el.addEventListener('input', e => {
          state.resultsCopy[e.target.dataset.rc][e.target.dataset.field] = e.target.value;
        });
      });
    });
  }

  /* ---- Drawer: Settings Tab ---- */
  function renderDrawerSettings(body) {
    const s = state.settings;
    body.innerHTML = `<div class="drawer-section-title">Edit Settings</div>`;

    const rows = [
      { label: 'Quiz Name', type: 'text', id: 'ds-name', val: s.quizName, fullWidth: true },
    ];

    /* Quiz name */
    const nameWrap = document.createElement('div');
    nameWrap.innerHTML = `
      <div class="drawer-label">Quiz Name</div>
      <input class="drawer-input" id="ds-name" type="text" value="${escHtml(s.quizName)}" />
    `;
    body.appendChild(nameWrap);
    nameWrap.querySelector('#ds-name').addEventListener('input', e => {
      state.settings.quizName = e.target.value;
    });

    /* Toggle rows */
    const toggleRows = [
      { id: 'ds-shuffle-q', label: 'Shuffle Questions', key: 'shuffleQuestions' },
      { id: 'ds-shuffle-a', label: 'Shuffle Answers',   key: 'shuffleAnswers'   },
      { id: 'ds-timer-on',  label: 'Timer per Question', key: 'timerEnabled'    },
      { id: 'ds-pass-on',   label: 'Passmark Enabled',   key: 'passmarkEnabled' },
    ];

    toggleRows.forEach(({ id, label, key }) => {
      const row = document.createElement('div');
      row.className = 'drawer-settings-row';
      row.innerHTML = `
        <span class="drawer-settings-lbl">${label}</span>
        <div class="drawer-settings-right">
          ${key === 'timerEnabled' ? `<input class="drawer-settings-input" id="ds-timer-secs" type="number" min="3" max="300" value="${s.timerSeconds}" ${s.timerEnabled ? '' : 'disabled'} />` : ''}
          ${key === 'passmarkEnabled' ? `<input class="drawer-settings-input" id="ds-pass-val" type="number" min="1" max="100" value="${s.passmarkValue}" ${s.passmarkEnabled ? '' : 'disabled'} />` : ''}
          <label class="toggle-switch" style="transform:scale(0.85);">
            <input type="checkbox" id="${id}" ${s[key] ? 'checked' : ''} />
            <span class="toggle-slider"></span>
          </label>
        </div>
      `;
      body.appendChild(row);

      row.querySelector(`#${id}`).addEventListener('change', e => {
        state.settings[key] = e.target.checked;
        if (key === 'timerEnabled') {
          const secsIn = document.getElementById('ds-timer-secs');
          if (secsIn) secsIn.disabled = !e.target.checked;
        }
        if (key === 'passmarkEnabled') {
          const passIn = document.getElementById('ds-pass-val');
          if (passIn) passIn.disabled = !e.target.checked;
        }
        if (!state.openingManuallyEdited) {
          state.openingParagraphs = generateOpeningParagraphs();
        }
      });
    });

    /* Timer seconds input change */
    body.addEventListener('input', e => {
      if (e.target.id === 'ds-timer-secs') {
        state.settings.timerSeconds = Math.max(3, parseInt(e.target.value) || 10);
        if (!state.openingManuallyEdited) state.openingParagraphs = generateOpeningParagraphs();
      }
      if (e.target.id === 'ds-pass-val') {
        state.settings.passmarkValue = Math.min(100, Math.max(1, parseInt(e.target.value) || 80));
        if (!state.openingManuallyEdited) state.openingParagraphs = generateOpeningParagraphs();
      }
    });

    /* Feedback messages */
    const msgWrap = document.createElement('div');
    msgWrap.innerHTML = `
      <div class="drawer-label" style="margin-top:0.4rem;">Correct messages (comma-separated)</div>
      <input class="drawer-input" id="ds-correct-msgs" type="text" value="${escHtml(s.correctMessages.join(', '))}" style="margin-bottom:0.45rem;" />
      <div class="drawer-label">Incorrect messages (comma-separated)</div>
      <input class="drawer-input" id="ds-incorrect-msgs" type="text" value="${escHtml(s.incorrectMessages.join(', '))}" />
    `;
    body.appendChild(msgWrap);

    msgWrap.querySelector('#ds-correct-msgs').addEventListener('input', e => {
      const msgs = e.target.value.split(',').map(m => m.trim()).filter(Boolean);
      state.settings.correctMessages = msgs.length ? msgs : ['Correct!'];
    });
    msgWrap.querySelector('#ds-incorrect-msgs').addEventListener('input', e => {
      const msgs = e.target.value.split(',').map(m => m.trim()).filter(Boolean);
      state.settings.incorrectMessages = msgs.length ? msgs : ['Incorrect!'];
    });
  }

  /* ============================================================
     HTML ESCAPE HELPER
  ============================================================ */
  function escHtml(str) {
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;');
  }

  /* ============================================================
     INITIALISE
  ============================================================ */
  render();
  </script>
</body>
</html>
